name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Allow pnpm builds for native deps
        run: pnpm config set onlyBuiltDependencies "sharp,@firebase/util"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Allow pnpm builds for native deps
        run: pnpm config set onlyBuiltDependencies "sharp,@firebase/util"
      - run: pnpm install --frozen-lockfile
      # Tolerate pre-existing tsc errors (26) via baseline comparison.
      # TODO(Sprint4): remove the baseline check once 26 errors are fixed.
      - name: Type check (baseline-aware)
        run: |
          OUTPUT=$(pnpm exec tsc --noEmit 2>&1 || true)
          echo "$OUTPUT"
          ERROR_COUNT=$(echo "$OUTPUT" | grep -c "^src/" || true)
          echo "TypeScript error count: $ERROR_COUNT (baseline: 26)"
          if [ "$ERROR_COUNT" -gt 26 ]; then
            echo "FAIL: New TypeScript errors introduced ($ERROR_COUNT > 26 baseline)"
            exit 1
          fi

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Allow pnpm builds for native deps
        run: pnpm config set onlyBuiltDependencies "sharp,@firebase/util"
      - run: pnpm install --frozen-lockfile
      - name: Cache .next
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: next-${{ runner.os }}-
      - run: pnpm test

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: test # E2E runs after unit tests pass (it's slower)
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Allow pnpm builds for native deps
        run: pnpm config set onlyBuiltDependencies "sharp,@firebase/util"
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Start Firebase Auth Emulator
        run: firebase emulators:start --only auth &
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
      - name: Wait for emulator
        run: npx wait-on http://127.0.0.1:9099
      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          CI: true
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
