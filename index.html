<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#050505" />
    <meta name="background-color" content="#050505" />
    <meta name="description" content="Pulse - Smart Fitness App. Track your workouts, smash your goals, and monitor progress." />
    
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pulse" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    
    <!-- Android PWA -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    
    <title>Pulse | Fitness Tracker</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    
    <!-- Prevent FOUC -->
    <style>
      html { background-color: #050505; }
      html[data-theme="light"] { background-color: #F9FAFB; }
      html[data-theme="dark"] { background-color: #050505; }
    </style>
    <script>
      (function() {
        try {
          var stateItem = localStorage.getItem('pulse-settings');
          var state = stateItem ? JSON.parse(stateItem).state : null;
          var theme = state ? state.theme : 'system';
          
          if (theme === 'system') {
            var systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', systemPrefersDark ? 'dark' : 'light');
          } else {
            document.documentElement.setAttribute('data-theme', theme);
          }
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
